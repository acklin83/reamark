# Run ReaMark from prebuilt images — no source checkout or build needed.
# You only need this file and a .env with REAMARK_SECRET_KEY.
#
#   curl -O https://raw.githubusercontent.com/acklin83/reamark/main/docker-compose.ghcr.yml
#   echo "REAMARK_SECRET_KEY=$(openssl rand -hex 32)" > .env
#   docker compose -f docker-compose.ghcr.yml up -d
#
# Then open http://<host>:8080/admin to set the admin password.
services:
  backend:
    image: ghcr.io/acklin83/reamark-backend:latest
    volumes:
      - ./data:/data
    environment:
      - REAMARK_SECRET_KEY=${REAMARK_SECRET_KEY:?Set REAMARK_SECRET_KEY in .env (openssl rand -hex 32)}
    restart: unless-stopped

  nginx:
    image: ghcr.io/acklin83/reamark-nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./data/uploads:/data/uploads:ro
    depends_on:
      - backend
    restart: unless-stopped
